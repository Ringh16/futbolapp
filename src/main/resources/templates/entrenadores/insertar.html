<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Insertar Entrenadores</title><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa}
.navbar-brand{font-weight:700}
.card{box-shadow:0 4px 6px rgba(0,0,0,0.1);border:none}
.table thead th{background:#198754;color:#fff}
.btn-success{background:#198754;border:none}
.btn-success:hover{background:#146c43}
.btn-danger{background:#dc3545;border:none}
.btn-primary{background:#0d6efd;border:none}
.form-label{font-weight:600}
</style></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
<div class="container">
<a class="navbar-brand" href="/">⚽ FutbolApp</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link " href="/">Inicio</a></li>
<li class="nav-item"><a class="nav-link active" href="/entrenadores">Entrenadores</a></li>
<li class="nav-item"><a class="nav-link " href="/jugadores">Jugadores</a></li>
<li class="nav-item"><a class="nav-link " href="/asociaciones">Asociaciones</a></li>
<li class="nav-item"><a class="nav-link " href="/competiciones">Competiciones</a></li>
<li class="nav-item"><a class="nav-link " href="/clubes">Clubes</a></li></ul>
</div>
</div>
</nav>
<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card">
<div class="card-body">
<h3 class="card-title mb-4">Nuevo Entrenadore</h3>
<form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post">
<div class="mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" th:field="*{nombre}" required></div>
<div class="mb-3"><label class="form-label">Apellido</label><input type="text" class="form-control" th:field="*{apellido}" required></div>
<div class="mb-3"><label class="form-label">Edad</label><input type="number" class="form-control" th:field="*{edad}" required></div>
<div class="mb-3"><label class="form-label">Nacionalidad</label><input type="text" class="form-control" th:field="*{nacionalidad}" required></div>
<div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
<a th:href="@{/entrenadores}" class="btn btn-secondary">Cancelar</a>
<button type="submit" class="btn btn-success">Guardar</button>
</div>
</form>
</div>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
