<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Listar Clubes</title><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa}
.navbar-brand{font-weight:700}
.card{box-shadow:0 4px 6px rgba(0,0,0,0.1);border:none}
.table thead th{background:#198754;color:#fff}
.btn-success{background:#198754;border:none}
.btn-success:hover{background:#146c43}
.btn-danger{background:#dc3545;border:none}
.btn-primary{background:#0d6efd;border:none}
.form-label{font-weight:600}
</style></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
<div class="container">
<a class="navbar-brand" href="/">⚽ FutbolApp</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link " href="/">Inicio</a></li>
<li class="nav-item"><a class="nav-link " href="/entrenadores">Entrenadores</a></li>
<li class="nav-item"><a class="nav-link " href="/jugadores">Jugadores</a></li>
<li class="nav-item"><a class="nav-link " href="/asociaciones">Asociaciones</a></li>
<li class="nav-item"><a class="nav-link " href="/competiciones">Competiciones</a></li>
<li class="nav-item"><a class="nav-link active" href="/clubes">Clubes</a></li></ul>
</div>
</div>
</nav>
<div class="container">
<div class="card">
<div class="card-body">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2 class="card-title mb-0">Clubes</h2>
<a th:href="@{'/clubes/nuevo'}" class="btn btn-success">+ Nuevo Club</a>
</div>
<div class="table-responsive">
<table class="table table-striped table-hover">
<thead><tr><th>ID</th><th>Nombre</th><th>Entrenador</th><th>Asociación</th><th>Jugadores</th><th>Competiciones</th><th class="text-center">Acciones</th></tr></thead>
<tbody>
<tr th:each="club : ${clubes}">
<td th:text="${club.id}"></td>
<td th:text="${club.nombre != null ? club.nombre : 'Sin nombre'}"></td>
<td th:text="${club.entrenador != null ? club.entrenador.nombre + ' ' + club.entrenador.apellido : 'Sin entrenador'}"></td>
<td th:text="${club.asociacion != null ? club.asociacion.nombre : 'Sin asociación'}"></td>
<td>
<ul class="list-unstyled mb-0">
<li th:each="j : ${club.jugadores}" th:text="${j.nombre + ' ' + j.apellido}"></li>
</ul>
</td>
<td>
<ul class="list-unstyled mb-0">
<li th:each="c : ${club.competiciones}" th:text="${c.nombre}"></li>
</ul>
</td>
<td class="text-center"><a th:href="@{'/clubes/eliminar/' + ${club.id}}" class="btn btn-sm btn-danger">Eliminar</a></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
